services:
  sangam:
    build: .
    image: ${SANGAM_IMAGE:-sangam:dev}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/database:/data/database
      - ./data/workspace:/data/workspace
      - ./data/backups:/data/backups
    environment:
      SANGAM_DEPLOYMENT_MODE: ${SANGAM_DEPLOYMENT_MODE:-development}
      SANGAM_DATABASE_PATH: /data/database/sangam.sqlite3
      SANGAM_WORKSPACE_ROOT: /data/workspace
      SANGAM_BACKUP_ROOT: /data/backups
      SANGAM_BACKUP_RETENTION_COUNT: ${SANGAM_BACKUP_RETENTION_COUNT:-14}
      SANGAM_BACKUP_CHECK_INTERVAL_SECONDS: ${SANGAM_BACKUP_CHECK_INTERVAL_SECONDS:-3600}
      SANGAM_BACKUP_READINESS_MAX_AGE_SECONDS: ${SANGAM_BACKUP_READINESS_MAX_AGE_SECONDS:-129600}
      SANGAM_BACKUPS_ENABLED: ${SANGAM_BACKUPS_ENABLED:-true}
      SANGAM_FRONTEND_DIST: /app/frontend/dist
      SANGAM_MAX_DOCUMENT_BYTES: ${SANGAM_MAX_DOCUMENT_BYTES:-2000000}
      SANGAM_MAX_PDF_BYTES: ${SANGAM_MAX_PDF_BYTES:-100000000}
      SANGAM_PDF_EXTRACTION_SHUTDOWN_TIMEOUT_SECONDS: ${SANGAM_PDF_EXTRACTION_SHUTDOWN_TIMEOUT_SECONDS:-5}
      SANGAM_MAX_PUBLICATION_ASSET_BYTES: ${SANGAM_MAX_PUBLICATION_ASSET_BYTES:-10000000}
      SANGAM_MAX_KARAKEEP_SOURCE_BYTES: ${SANGAM_MAX_KARAKEEP_SOURCE_BYTES:-5000000}
      SANGAM_KARAKEEP_BASE_URL: ${SANGAM_KARAKEEP_BASE_URL:-}
      SANGAM_KARAKEEP_API_KEY: ${SANGAM_KARAKEEP_API_KEY:-}
      SANGAM_KARAKEEP_TIMEOUT_SECONDS: ${SANGAM_KARAKEEP_TIMEOUT_SECONDS:-20}
      SANGAM_OPENROUTER_API_KEY: ${SANGAM_OPENROUTER_API_KEY:-}
      SANGAM_OPENROUTER_BASE_URL: ${SANGAM_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      SANGAM_OPENROUTER_HTTP_REFERER: ${SANGAM_OPENROUTER_HTTP_REFERER:-}
      SANGAM_OPENROUTER_APP_TITLE: ${SANGAM_OPENROUTER_APP_TITLE:-Sangam}
      SANGAM_CHATKIT_DOMAIN_KEY: ${SANGAM_CHATKIT_DOMAIN_KEY:-local-dev}
      SANGAM_CHAT_DEFAULT_MODEL: ${SANGAM_CHAT_DEFAULT_MODEL:-openai/gpt-5.4-mini}
      SANGAM_CHAT_AVAILABLE_MODELS: ${SANGAM_CHAT_AVAILABLE_MODELS:-["openai/gpt-5.4-mini","openai/gpt-5.4-nano","openai/gpt-5.6-terra"]}
      SANGAM_CHAT_REASONING_EFFORT: ${SANGAM_CHAT_REASONING_EFFORT:-low}
      SANGAM_CHAT_TIMEOUT_SECONDS: ${SANGAM_CHAT_TIMEOUT_SECONDS:-120}
      SANGAM_CHAT_MAX_TOOL_ROUNDS: ${SANGAM_CHAT_MAX_TOOL_ROUNDS:-8}
      SANGAM_CHAT_MAX_TOOL_RESULT_BYTES: ${SANGAM_CHAT_MAX_TOOL_RESULT_BYTES:-40000}
      SANGAM_CHAT_MAX_CONTEXT_MESSAGES: ${SANGAM_CHAT_MAX_CONTEXT_MESSAGES:-20}
      SANGAM_AUTH_MODE: ${SANGAM_AUTH_MODE:-single_user}
      SANGAM_TRUSTED_IDENTITY_HEADER: ${SANGAM_TRUSTED_IDENTITY_HEADER:-X-Sangam-Trusted-Identity}
      SANGAM_TRUSTED_IDENTITY_VALUE: ${SANGAM_TRUSTED_IDENTITY_VALUE:-human:jay}
      SANGAM_TRUSTED_HUMAN_ACTOR_ID: ${SANGAM_TRUSTED_HUMAN_ACTOR_ID:-human:jay}
      SANGAM_TRUSTED_HUMAN_DISPLAY_NAME: ${SANGAM_TRUSTED_HUMAN_DISPLAY_NAME:-Jay}
      SANGAM_PREVIEW_HMAC_SECRET: ${SANGAM_PREVIEW_HMAC_SECRET:-development-only-preview-secret-change-me}
      SANGAM_PREVIEW_TOKEN_TTL_SECONDS: ${SANGAM_PREVIEW_TOKEN_TTL_SECONDS:-120}
      SANGAM_PUBLICATION_BASE_URL: ${SANGAM_PUBLICATION_BASE_URL:-http://127.0.0.1:8000/p}
      SANGAM_TRUSTED_PREVIEW_BASE_URL: ${SANGAM_TRUSTED_PREVIEW_BASE_URL:-http://127.0.0.1:8000/trusted-preview}
      SANGAM_TRUSTED_PREVIEW_HOST: ${SANGAM_TRUSTED_PREVIEW_HOST:-}
      SANGAM_TRUSTED_PREVIEW_PARENT_ORIGINS: ${SANGAM_TRUSTED_PREVIEW_PARENT_ORIGINS:-["http://127.0.0.1:8000"]}
      SANGAM_TRUSTED_PREVIEW_CONNECT_SRC: ${SANGAM_TRUSTED_PREVIEW_CONNECT_SRC:-[]}
      SANGAM_CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${SANGAM_CLOUDFLARE_ACCESS_TEAM_DOMAIN:-}
      SANGAM_CLOUDFLARE_ACCESS_AUDIENCE: ${SANGAM_CLOUDFLARE_ACCESS_AUDIENCE:-}
      SANGAM_CLOUDFLARE_ACCESS_EMAIL: ${SANGAM_CLOUDFLARE_ACCESS_EMAIL:-}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/readiness', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
