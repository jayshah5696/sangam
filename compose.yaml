services:
  sangam:
    build: .
    image: sangam:phase3
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/database:/data/database
      - ./data/workspace:/data/workspace
      - ./data/backups:/data/backups
    environment:
      SANGAM_DATABASE_PATH: /data/database/sangam.sqlite3
      SANGAM_WORKSPACE_ROOT: /data/workspace
      SANGAM_BACKUP_ROOT: /data/backups
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
