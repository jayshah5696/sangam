name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    name: Re-run release gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.13"
          enable-cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          package-manager-cache: false
      - run: uv sync --frozen
      - run: npm ci --prefix frontend
      - name: Python and frontend gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest
          npm --prefix frontend run format:check
          npm --prefix frontend run build
          npm --prefix frontend run lint
          npm --prefix frontend run test
      - name: Documentation gates
        run: |
          uv run python scripts/verify-docs.py
          node frontend/scripts/verify-mermaid.mjs
          npm --prefix frontend exec markdownlint-cli2 "README.md" "SECURITY.md" "docs/**/*.md"
      - run: uv run python scripts/verify-release-config.py
      - run: uv run python scripts/verify-version.py --expected "${GITHUB_REF_NAME}" --frontend-dist
      - run: ./scripts/audit-dependencies.sh
      - run: ./scripts/smoke-package.sh
      - name: Build release artifacts
        run: |
          rm -rf dist
          uv build
          (cd dist && sha256sum sangam-*) > dist/SHA256SUMS
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 7

  scan:
    name: Smoke and scan before push
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build the release candidate locally
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          push: false
          tags: sangam:release-scan
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Exercise the exact release candidate
        env:
          SANGAM_SMOKE_IMAGE: sangam:release-scan
          SANGAM_SKIP_DOCKER_BUILD: "true"
        run: ./scripts/docker-smoke.sh
      - name: Report all HIGH and CRITICAL findings before registry push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sangam:release-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Block fixable HIGH and CRITICAL findings before registry push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: sangam:release-scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  publish:
    name: Publish signed multi-arch image
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Sangam
            org.opencontainers.image.description=A self-hosted document workspace for humans and agents
            org.opencontainers.image.licenses=Apache-2.0
      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Keyless-sign the immutable image digest
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}"
      - name: Publish GitHub provenance attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: dist
      - name: Attest wheel, sdist, and checksums
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: dist/*
      - name: Create the immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          prerelease=()
          case "$GITHUB_REF_NAME" in
            *-*) prerelease=(--prerelease) ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --notes "Container: \`${REGISTRY}/${IMAGE_NAME}@${IMAGE_DIGEST}\`" \
            "${prerelease[@]}"
